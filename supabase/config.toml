# Minimal Supabase config for the kai-proxy project (SEC-01).
# A full config is generated by `supabase init` once Docker/Supabase CLI are set up;
# this carries the project id and the Edge Function registration so `supabase link`
# + `supabase functions deploy kai-proxy` work without re-scaffolding.

project_id = "kaizenn-proxy"

[functions.kai-proxy]
# JWT verification is disabled because the function does its own App Attest
# authentication (see appattest.ts) rather than relying on Supabase Auth JWTs.
verify_jwt = false
